<div class="experience-page">

  <!-- Sidebar -->
  <aside class="exp-sidebar">
    <div class="exp-sidebar__header">
      <a routerLink="/" class="exp-sidebar__back">
        <mat-icon class="mat-icon">arrow_back</mat-icon>
        <span>All work</span>
      </a>
      <span class="exp-sidebar__eyebrow">Experience</span>
      <h1 class="exp-sidebar__title">Selected <em class="serif-italic">roles</em></h1>
    </div>

    <nav class="exp-sidebar__nav">
      <button
        *ngFor="let exp of experiences; let i = index"
        class="exp-sidebar__item"
        [class.is-active]="activeIndex === i"
        (click)="scrollToExperience(i)">
        <span class="exp-sidebar__item-num">{{ padIndex(i) }}</span>
        <div class="exp-sidebar__item-body">
          <span class="exp-sidebar__item-company">{{ exp.company }}</span>
          <span class="exp-sidebar__item-meta">{{ exp.start }} &mdash; {{ exp.end }}</span>
        </div>
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="exp-main" #mainContent>
    <div class="exp-main__inner">
      <article
        *ngFor="let exp of experiences; let i = index"
        #experienceSection
        class="exp-entry"
        [attr.data-index]="i">

        <header class="exp-entry__header">
          <div class="exp-entry__meta">
            <span class="exp-entry__num">{{ padIndex(i) }}</span>
            <span class="exp-entry__dot">&middot;</span>
            <span class="exp-entry__type">{{ exp.type }}</span>
          </div>

          <h2 class="exp-entry__company">
            <em class="serif-italic">{{ exp.company }}</em>
          </h2>

          <div class="exp-entry__role">
            <span class="exp-entry__title">{{ exp.title }}</span>
            <span class="exp-entry__sep">&mdash;</span>
            <span class="exp-entry__dates">{{ exp.start }} &mdash; {{ exp.end }}</span>
            <span class="exp-entry__sep">&middot;</span>
            <span class="exp-entry__location">{{ exp.location }}</span>
          </div>

          <p class="exp-entry__summary">{{ exp.summary }}</p>

          <a class="exp-entry__visit" [href]="exp.website" target="_blank" rel="noopener noreferrer">
            Visit {{ exp.company }}
            <mat-icon class="mat-icon">arrow_outward</mat-icon>
          </a>
        </header>

        <section class="exp-entry__details">
          <span class="exp-entry__details-label">Highlights</span>
          <ul>
            <li *ngFor="let detail of exp.details">{{ detail }}</li>
          </ul>
        </section>
      </article>
    </div>
  </main>
</div>

<div #customCursor class="custom-cursor"></div>
